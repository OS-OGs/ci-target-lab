name: control-persist-credentials-false

on:
  pull_request_target:
    types: [labeled]

jobs:
  control:
    if: "github.event.label.name == 'tests: run'"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout PR code without persisted git credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false

      - name: Run PR-controlled tests
        env:
          DUMMY_SECRET: ${{ secrets.DUMMY_SECRET }}
        run: |
          echo "persist_credentials=false"
          if [ -n "$DUMMY_SECRET" ]; then
            echo "dummy_secret_visible=true"
          else
            echo "dummy_secret_visible=false"
          fi
          go test -v ./...
