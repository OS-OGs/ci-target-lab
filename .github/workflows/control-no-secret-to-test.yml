name: control-no-secret-to-test

on:
  pull_request_target:
    types: [labeled]

jobs:
  control:
    if: "github.event.label.name == 'tests: run'"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Check privileged context in separate step
        env:
          DUMMY_SECRET: ${{ secrets.DUMMY_SECRET }}
        run: |
          echo "privileged_context_reached=true"
          if [ -n "$DUMMY_SECRET" ]; then
            echo "dummy_secret_visible_in_privileged_step=true"
          else
            echo "dummy_secret_visible_in_privileged_step=false"
          fi

      - name: Run PR-controlled tests without secret env
        run: |
          go test -v ./...
